# =============================================================================
# QuantShine Capital - Backend CI/CD
# Tetikleyici: main branch'e push (backend dizininde değişiklik olduğunda)
# Akış: Maven build → Docker image → Docker Hub push → EC2'de güncelle
#
# GitHub Secrets:
#   DOCKERHUB_USERNAME    : Docker Hub kullanıcı adı
#   DOCKERHUB_TOKEN       : Docker Hub access token
#   EC2_HOST              : EC2 public IP veya domain (örn: 1.2.3.4)
#   EC2_USER              : SSH kullanıcı adı (genellikle: ubuntu veya ec2-user)
#   EC2_SSH_KEY           : EC2 .pem dosyasının içeriği (-----BEGIN RSA...)
# =============================================================================

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - '../quantshine_capital/src/**'
      - '../quantshine_capital/pom.xml'
      - '../quantshine_capital/Dockerfile'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:    # Manuel tetikleme

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/quantshine-backend

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Maven Build (tests skip - prod deploy hızlı olsun)
        working-directory: ../quantshine_capital
        run: ./mvnw package -DskipTests -B -q

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ../quantshine_capital
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy-to-ec2:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: SSH to EC2 & Rolling Deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/quantshine

            echo "==> Yeni image çekiliyor..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod pull backend

            echo "==> Backend yeniden başlatılıyor..."
            docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --no-deps backend

            echo "==> Eski image'lar temizleniyor..."
            docker image prune -f

            echo "✅ Backend başarıyla güncellendi!"
