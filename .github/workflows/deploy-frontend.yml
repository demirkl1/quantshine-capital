# =============================================================================
# QuantShine Capital - Frontend CI/CD (Docker + EC2)
# Tetikleyici: main branch'e push
# Akış: Docker image build (amd64) → Docker Hub push → EC2'de pull + restart
#
# Mevcut üretim mimarisi (tek EC2 + docker-compose) ile uyumludur.
# (S3 + CloudFront modeline geçilirse bu workflow güncellenmelidir — bkz.
#  deploy/AWS-SCALING.md)
#
# GitHub Secrets (Repo → Settings → Secrets and variables → Actions):
#   DOCKERHUB_USERNAME : Docker Hub kullanıcı adı (örn: ddemirkl1)
#   DOCKERHUB_TOKEN    : Docker Hub access token
#   EC2_HOST           : EC2 public IP / domain (örn: 13.50.143.135)
#   EC2_USER           : SSH kullanıcı adı (örn: ubuntu)
#   EC2_SSH_KEY        : EC2 özel anahtar içeriği (-----BEGIN ... PRIVATE KEY-----)
#   DOMAIN             : (opsiyonel) örn: quant-shine.com (yoksa default kullanılır)
# =============================================================================

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'deploy/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

env:
  IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/quantshine-frontend:latest
  DOMAIN: ${{ secrets.DOMAIN || 'quant-shine.com' }}

jobs:
  quality:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --watchAll=false
        env:
          CI: true

  build-and-deploy:
    name: Build, Push & Deploy
    needs: quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            REACT_APP_API_BASE_URL=/api
            REACT_APP_KEYCLOAK_URL=https://${{ env.DOMAIN }}/auth
            REACT_APP_KEYCLOAK_REALM=quantshine
            REACT_APP_KEYCLOAK_CLIENT_ID=quantshine-backend
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy on EC2 (pull + restart)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/quantshine/quantshine-capital
            sudo git fetch origin main && sudo git reset --hard origin/main
            sudo cp deploy/docker-compose.prod.yml /opt/quantshine/
            sudo cp -r deploy/nginx /opt/quantshine/
            cd /opt/quantshine
            sudo docker compose -f docker-compose.prod.yml pull frontend
            sudo docker compose -f docker-compose.prod.yml up -d frontend
            sudo docker compose -f docker-compose.prod.yml restart nginx
            echo "✅ Frontend deployed"

      - name: Summary
        run: echo "✅ Frontend image pushed ($IMAGE) and deployed to EC2."
