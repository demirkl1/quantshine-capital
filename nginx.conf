server {
    listen 80;
    server_tokens off;  # Nginx sürüm bilgisini gizle

    # ── Güvenlik Başlıkları ──────────────────────────────────────────
    # Clickjacking koruması
    add_header X-Frame-Options "SAMEORIGIN" always;

    # MIME sniffing koruması
    add_header X-Content-Type-Options "nosniff" always;

    # XSS filtresi (eski tarayıcılar için)
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer bilgisini sınırla
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Hassas API izinlerini kısıtla
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Content Security Policy
    # - default-src 'self': yalnızca kendi kaynaktan içerik
    # - script-src 'self': inline script yok, yalnızca kendi JS
    # - style-src 'self' 'unsafe-inline': CSS inline (Recharts vb. için gerekli)
    # - connect-src: API ve Keycloak sunucularına bağlantıya izin ver
    # - img-src: veri URI ve kendi sunucu
    # - font-src: Google Fonts
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://s3.tradingview.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://quant-shine.com https://*.tradingview.com wss://*.tradingview.com; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # ── SPA Routing ──────────────────────────────────────────────────
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;

        # HTML dosyaları önbelleklenmemeli (güncel SPA build her zaman sunulsun)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;

        # Güvenlik başlıklarını tekrar ekle (location bloğu üst düzeydekileri ezer)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://s3.tradingview.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://quant-shine.com https://*.tradingview.com wss://*.tradingview.com; img-src 'self' data: https:; object-src 'none'; base-uri 'self'; form-action 'self';" always;
    }

    # ── Statik Varlıklar (JS/CSS/Image) ─────────────────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";

        # Statik dosyalara da güvenlik başlıkları
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # ── Gizli Dosyaları Engelle ──────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # ── Source Map Dosyalarını Üretimde Engelle ──────────────────────
    location ~* \.map$ {
        deny all;
        return 404;
    }
}
